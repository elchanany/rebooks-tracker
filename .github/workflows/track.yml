name: Rebooks Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'books.json'
  workflow_dispatch:

concurrency:
  group: tracker
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run continuous tracker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python tracker.py --loop

    - name: Final commit
      if: always()
      run: |
        git config user.name "Bot"
        git config user.email "bot@local"
        git add books.json
        git diff --staged --quiet || (git commit -m "Final update [skip ci]" && git push)
