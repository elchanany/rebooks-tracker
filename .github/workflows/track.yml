name: Rebooks Tracker Scan

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Run tracker script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python tracker.py
        
    - name: Commit updated books.json
      run: |
        git config --global user.name "Rebooks Tracker Bot"
        git config --global user.email "bot@tracker.local"
        git add books.json
        git commit -m "Update stock status" || exit 0
        git push
